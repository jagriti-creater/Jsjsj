<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
overflow:hidden;
}

section{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
}

.next{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#ff2ea6;
color:white;
}

#backBtn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#00ff00;
color:black;
display:none;
}

/* VIDEO */

video{
width:90%;
max-width:500px;
border-radius:10px;
}

/* SECTION 3 */

.wrapper{
transform:rotate(90deg);
width:100vh;
height:100vw;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
width:100%;
height:100%;
}

/* SECTION 5 */

.gallery-container{
width:300px;
height:300px;
perspective:1200px;
display:flex;
justify-content:center;
align-items:center;
}

.gallery{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
animation:rotate 18s linear infinite;
}

.gallery img{
position:absolute;
width:160px;
height:160px;
object-fit:cover;
border-radius:15px;
left:50%;
top:50%;
cursor:pointer;
}

.gallery img:nth-child(1){transform:rotateY(0deg) translateZ(250px);}
.gallery img:nth-child(2){transform:rotateY(45deg) translateZ(250px);}
.gallery img:nth-child(3){transform:rotateY(90deg) translateZ(250px);}
.gallery img:nth-child(4){transform:rotateY(135deg) translateZ(250px);}
.gallery img:nth-child(5){transform:rotateY(180deg) translateZ(250px);}
.gallery img:nth-child(6){transform:rotateY(225deg) translateZ(250px);}
.gallery img:nth-child(7){transform:rotateY(270deg) translateZ(250px);}
.gallery img:nth-child(8){transform:rotateY(315deg) translateZ(250px);}

@keyframes rotate{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

</style>
</head>

<body>

<!-- SECTION 1 -->

<section id="sec1">
<h1>Wait For Surprise 🎁</h1>
</section>

<!-- SECTION 2 -->

<section id="sec2" style="display:none">

<video id="video" muted playsinline>
<source src="video.mp4" type="video/mp4">
</video>

</section>

<!-- SECTION 3 -->

<section id="sec3" style="display:none">

<div class="wrapper">
<canvas id="canvas"></canvas>
</div>

</section>

<!-- SECTION 4 -->

<section id="sec4" style="display:none">

<h2>Best Wishes ❤️</h2>

<p style="padding:20px">
May your life be filled with happiness,
success and lots of love.
</p>

<button class="next" onclick="showSection(5)">Next</button>

</section>

<!-- SECTION 5 -->

<section id="sec5" style="display:none">

<h2>Happy Birthday 🎉</h2>

<audio id="song" src="song.mp3"></audio>

<div class="gallery-container">

<div class="gallery" id="gallery">

<img src="p1.jpg">
<img src="p2.jpg">
<img src="p3.jpg">
<img src="p4.jpg">
<img src="p5.jpg">
<img src="p6.jpg">
<img src="p7.jpg">
<img src="p8.jpg">

</div>

</div>

<button id="backBtn" onclick="closeZoom()">Back</button>

<button class="next" onclick="showSection(6)">Next</button>

</section>

<!-- SECTION 6 -->

<section id="sec6" style="display:none">

<h1>HAPPY BIRTHDAY</h1>
<h2>TO MY CRIME PARTNER ❤️</h2>

</section>

<script>

/* SECTION CONTROL */

function showSection(n){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById("sec"+n).style.display="flex"

/* video */

if(n==2){

let video=document.getElementById("video")

video.play()

video.onended=function(){

showSection(3)

startAnimation()

}

}

/* song */

let song=document.getElementById("song")

if(n==5){

song.play()

}else{

song.pause()

song.currentTime=0

}

}

/* section1 auto */

setTimeout(()=>{showSection(2)},2000)

/* SECTION 3 ANIMATION */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerHeight
canvas.height=window.innerWidth

let particles=[]
let texts=["3","2","1","Happy Birthday","To My Crime Partner"]

function createText(text){

particles=[]

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.font="bold 100px Arial"
ctx.textAlign="center"
ctx.textBaseline="middle"

ctx.fillText(text,canvas.width/2,canvas.height/2)

let data=ctx.getImageData(0,0,canvas.width,canvas.height).data

for(let y=0;y<canvas.height;y+=8){
for(let x=0;x<canvas.width;x+=8){

let i=(y*canvas.width+x)*4

if(data[i+3]>150){

particles.push({

x:Math.random()*canvas.width,
y:-Math.random()*canvas.height,

tx:x,
ty:y

})

}

}
}

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=(p.tx-p.x)*0.03
p.y+=(p.ty-p.y)*0.03

ctx.fillStyle="#ff4da6"

ctx.fillRect(p.x,p.y,5,5)

})

requestAnimationFrame(animate)

}

function startAnimation(){

animate()

let i=0

function nextText(){

if(i>=texts.length){

showSection(4)

return

}

createText(texts[i])

i++

setTimeout(nextText,2000)

}

nextText()

}

/* PHOTO ZOOM */

const gallery=document.getElementById("gallery")
const backBtn=document.getElementById("backBtn")

let zoomed=false

gallery.querySelectorAll("img").forEach(img=>{

img.addEventListener("click",()=>{

if(zoomed)return

zoomed=true

gallery.style.animationPlayState="paused"

img.style.transform="none"

img.style.position="fixed"

img.style.left="50%"
img.style.top="50%"

img.style.translate="-50% -50%"

img.style.width="90vw"
img.style.height="auto"
img.style.maxHeight="90vh"

img.style.zIndex="50"

backBtn.style.display="block"

document.querySelector("#sec5 .next").style.display="none"

})

})

function closeZoom(){

zoomed=false

gallery.style.animationPlayState="running"

backBtn.style.display="none"

document.querySelector("#sec5 .next").style.display="block"

gallery.querySelectorAll("img").forEach(img=>{

img.style.position="absolute"
img.style.transform=""
img.style.width="160px"
img.style.height="160px"

})

}

</script>

</body>
</html>
